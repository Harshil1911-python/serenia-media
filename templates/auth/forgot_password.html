{% extends "base.html" %}
{% block title %}Reset Password — Serenia Media{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-brand">
        <a href="{{ url_for('main.index') }}" class="logo-link">
            <div class="logo-icon"><i class="fa-solid fa-cloud"></i></div>
            <span class="logo-text">Serenia Media</span>
        </a>
    </div>
    <div class="auth-card">
        <h2>Forgot password?</h2>
        <p class="auth-subtitle">We'll send you a reset link</p>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-icon">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" name="email" required placeholder="you@example.com" autofocus>
                </div>
            </div>
            <button type="submit" class="btn-primary btn-full">Send Reset Link</button>
        </form>
        <p class="auth-switch"><a href="{{ url_for('auth.login') }}">← Back to sign in</a></p>
    </div>
</div>
{% endblock %}
