{% extends "base.html" %}
{% block title %}Set New Password — Serenia Media{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-brand">
        <a href="{{ url_for('main.index') }}" class="logo-link">
            <div class="logo-icon"><i class="fa-solid fa-cloud"></i></div>
            <span class="logo-text">Serenia Media</span>
        </a>
    </div>
    <div class="auth-card">
        <h2>Set new password</h2>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>New Password</label>
                <div class="input-icon">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="password" required placeholder="Min 8 characters" minlength="8" autofocus>
                </div>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-icon">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="confirm_password" required placeholder="Repeat password">
                </div>
            </div>
            <button type="submit" class="btn-primary btn-full">Update Password</button>
        </form>
    </div>
</div>
{% endblock %}
