{% extends "base.html" %}
{% block title %}Create Account — Serenia Media{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-brand">
        <a href="{{ url_for('main.index') }}" class="logo-link">
            <div class="logo-icon"><i class="fa-solid fa-cloud"></i></div>
            <span class="logo-text">Serenia Media</span>
        </a>
        <p class="auth-tagline">Your media, beautifully organised.</p>
    </div>
    <div class="auth-card">
        <h2>Create account</h2>
        <p class="auth-subtitle">Join Serenia Media today</p>
        <form method="POST" action="{{ url_for('auth.register') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>Username</label>
                <div class="input-icon">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" name="username" required placeholder="yourname" value="{{ username or '' }}" minlength="3" autofocus>
                </div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <div class="input-icon">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" name="email" required placeholder="you@example.com" value="{{ email or '' }}">
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-icon">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="password" required placeholder="Min 8 characters" minlength="8">
                </div>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-icon">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="confirm_password" required placeholder="Repeat password">
                </div>
            </div>
            <button type="submit" class="btn-primary btn-full">Create Account</button>
        </form>
        <p class="auth-switch">Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
    </div>
</div>
{% endblock %}
