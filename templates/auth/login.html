{% extends "base.html" %}
{% block title %}Sign In — Serenia Media{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-brand">
        <a href="{{ url_for('main.index') }}" class="logo-link">
            <div class="logo-icon"><i class="fa-solid fa-cloud"></i></div>
            <span class="logo-text">Serenia Media</span>
        </a>
        <p class="auth-tagline">Your media, beautifully organised.</p>
    </div>
    <div class="auth-card">
        <h2>Welcome back</h2>
        <p class="auth-subtitle">Sign in to your account</p>
        <form method="POST" action="{{ url_for('auth.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>Email or Username</label>
                <div class="input-icon">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" name="identifier" required placeholder="you@example.com" autofocus>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-icon">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="password" required placeholder="••••••••" id="pwField">
                    <button type="button" class="toggle-pw" onclick="togglePw()"><i class="fa-solid fa-eye" id="pwIcon"></i></button>
                </div>
            </div>
            <div class="form-row">
                <label class="checkbox-label">
                    <input type="checkbox" name="remember"> Remember me
                </label>
                <a href="{{ url_for('auth.forgot_password') }}" class="link-muted">Forgot password?</a>
            </div>
            <button type="submit" class="btn-primary btn-full">Sign In</button>
        </form>
        <p class="auth-switch">Don't have an account? <a href="{{ url_for('auth.register') }}">Create one</a></p>
    </div>
</div>
<script>
function togglePw(){
    const f=document.getElementById('pwField');
    const i=document.getElementById('pwIcon');
    if(f.type==='password'){f.type='text';i.className='fa-solid fa-eye-slash';}
    else{f.type='password';i.className='fa-solid fa-eye';}
}
</script>
{% endblock %}
