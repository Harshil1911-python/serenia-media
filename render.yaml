services:
  - type: web
    name: serenia-media
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: serenia-db
          property: connectionString
      - key: MAX_CONTENT_LENGTH
        value: "104857600"
      - key: UPLOAD_FOLDER
        value: "static/uploads"

databases:
  - name: serenia-db
    databaseName: serenia_media
    user: serenia
    plan: free
